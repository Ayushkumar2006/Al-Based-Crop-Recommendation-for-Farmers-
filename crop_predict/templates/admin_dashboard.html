{% extends "base.html" %}
{% load static %}
<title>{% block title %} Admin Dashboard {% endblock %}</title>

{% block content %}
<h3 class="mb-3"><i class="fa-solid fa-gauge"></i> Dashboard </h3>

<div class="row g-4 mb-4">
    <div class="col g-4 md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <div class="text-muted">Users</div>
                    <div class="h3">{{total_users}}</div>
                </div>
                <i class="fa-solid fa-users fa-2xl text-success"></i>
            </div>
        </div>
    </div>
    <div class="col g-4 md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <div class="text-muted">Predictions</div>
                    <div class="h3">{{total_predictions}}</div>
                </div>
                <i class="fa-solid fa-seedling fa-2xl text-success"></i>
            </div>
        </div>
    </div>
</div>

<div class="row g-4 mb-4">
    <div class="col g-4 md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body" style="height: 500px;">
                <h5 class="mb-3"> <i class="fa-solid fa-chart-column"></i> Top Crops </h5>
                <canvas id="cropBar"></canvas>
            </div>
        </div>
    </div>
    <div class="col g-4 md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body" style="height: 500px;">
                <h5 class="mb-3"> <i class="fa-solid fa-chart-line"></i> Prediction  (7 days) </h5>
                <canvas id="dailyLine"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
<script>
    const cropLabels = JSON.parse('{{ crop_labels_json|escapejs }}');
    const cropCounts = JSON.parse('{{ crop_counts_json|escapejs }}');
    const dayLabels = JSON.parse('{{ day_labels_json|escapejs }}');
    const dayCounts = JSON.parse('{{ day_counts_json|escapejs }}');

    function makeOrReplaceChart(canvasId,config){
        const existing = Chart.getChart(canvasId);
        if (existing) existing.destroy();
        const canvas = document.getElementById(canvasId);
        if (!canvas) return null;
        return new Chart(canvas,config);
    }
    makeOrReplaceChart('cropBar',{
        type: 'bar',
        data: {
            labels : cropLabels,
            datasets : [{label:'Count' , data:cropCounts}]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false
        }
    });

    makeOrReplaceChart('dailyLine',{
        type: 'line',
        data: {
            labels : dayLabels,
            datasets : [{label:'Predictions' , data:dayCounts}]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false
        }
    });
</script>
{% endblock %}
